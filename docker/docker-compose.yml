name: environmental-monitoring

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  sensor-simulator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["monitoring.py", "--mode", "simulate"]
    environment:
      ENVMON_MQTT_BROKER_HOST: mosquitto
      ENVMON_SENSOR_ID: sensor-001
      ENVMON_SIMULATION_INTERVAL_SECONDS: "5"
    depends_on:
      mosquitto:
        condition: service_healthy

  ingestion:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["monitoring.py", "--mode", "ingest"]
    environment:
      ENVMON_MQTT_BROKER_HOST: mosquitto
      ENVMON_DATABASE_PATH: /data/readings.db
    volumes:
      - envmon-data:/data
    depends_on:
      mosquitto:
        condition: service_healthy

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["-m", "environmental_monitoring.dashboard"]
    environment:
      ENVMON_DATABASE_PATH: /data/readings.db
      ENVMON_DASHBOARD_PORT: "8050"
    ports:
      - "8050:8050"
    volumes:
      - envmon-data:/data
    depends_on:
      - ingestion

volumes:
  envmon-data:
